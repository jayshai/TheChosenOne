<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CHOSEN ONE // ARENA</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --bg-deep: #050507;
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
            --premium-gradient: linear-gradient(180deg, #FFFFFF 30%, #6366f1 100%);
            --btn-gradient: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            --txt-white: linear-gradient(180deg, #FFFFFF 40%, #a5a5a5 100%);
            --txt-accent: linear-gradient(180deg, #a5b4fc 0%, #6366f1 100%);
            --txt-gold: linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: var(--system-font); background-color: var(--bg-deep); color: #fff; height: 100vh; overflow: hidden; display: flex; flex-direction: column; }
        
        /* MULTIPLAYER UI MODIFIER */
        body.is-mob .chosen-only { display: none !important; }

        #bg-canvas { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1; background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%), radial-gradient(circle at 70% 70%, rgba(245, 158, 11, 0.08) 0%, transparent 40%); animation: auroraDrift 25s infinite alternate; }
        @keyframes auroraDrift { 0% { transform: translate(0, 0); } 100% { transform: translate(5%, 5%); } }

        .gt-white { background: var(--txt-white); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gt-accent { background: var(--txt-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gt-gold { background: var(--txt-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        header { height: 75px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .brand { font-weight: 900; font-size: 1.3rem; letter-spacing: -0.05em; background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        .user-profile { display: flex; align-items: center; gap: 12px; padding: 6px 16px; background: rgba(255,255,255,0.03); border-radius: 100px; border: 1px solid rgba(255,255,255,0.1); }
        .user-avatar { width: 32px; height: 32px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-weight: 800; font-size: 0.75rem; box-shadow: 0 0 15px var(--accent-glow); }

        main { display: grid; grid-template-columns: 100px 420px 1fr; flex-grow: 1; padding: 25px; gap: 20px; height: calc(100vh - 75px); position: relative; z-index: 1; }

        #ladder { display: flex; flex-direction: column-reverse; gap: 6px; }
        .step { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; color: #444; }
        .step.active { border-color: var(--gold); color: var(--gold); background: rgba(245, 158, 11, 0.1); }

        #contestant-panel { background: rgba(18, 18, 23, 0.6); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); padding: 30px; display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(25px); }

        .btn-opt { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; margin-bottom: 8px; border-radius: 16px; color: #fff; font-weight: 600; text-align: left; cursor: pointer; transition: 0.2s; }
        .btn-opt.locked { border-color: #fff; background: var(--btn-gradient); }
        .btn-opt.reveal-correct { background: #10b981 !important; }
        .btn-opt.reveal-wrong { background: #ef4444 !important; }

        #mob-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; height: 100%; }
        .mob-tile { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; color: rgba(255,255,255,0.1); transition: 0.3s; }
        .mob-tile.voted { background: rgba(99, 102, 241, 0.4); color: #fff; border-color: #fff; }
        .mob-tile.eliminated { opacity: 0; transform: scale(0.5); }

        .heatmap { display: flex; gap: 12px; height: 60px; margin: 10px 0; align-items: flex-end; opacity: 0; transition: 0.5s; }
        .heat-bar { flex: 1; border-radius: 8px 8px 2px 2px; min-height: 5px; background: #31313a; transition: height 0.8s; }
        .heat-bar.correct { background: #10b981; }
        .heat-bar.incorrect { background: #ef4444; }

        #lobby-overlay, #overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0, 0, 0, 0.8); backdrop-filter: blur(50px); z-index: 3000; display: flex; align-items: center; justify-content: center; text-align: center; }
        .premium-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.15); border-radius: 48px; padding: 60px; width: 540px; }
        .action-btn { width: 100%; padding: 22px; border-radius: 20px; border: none; font-weight: 900; cursor: pointer; background: var(--btn-gradient); color: #fff; text-transform: uppercase; }

        @media (max-width: 1024px) {
            main { display: flex; flex-direction: column; overflow-y: auto; height: auto; }
            #ladder { flex-direction: row; height: 40px; overflow-x: auto; }
            .step { min-width: 60px; }
            #mob-grid { grid-template-columns: repeat(10, 1fr); height: auto; }
            .premium-card { width: 90%; padding: 30px; }
        }
    </style>
</head>
<body class="">

<div id="bg-canvas"></div>

<div id="lobby-overlay">
    <div class="premium-card">
        <h1 class="gt-white" style="font-size: 3rem; margin: 0;">ARENA LOBBY</h1>
        <p id="lobby-status" class="gt-accent" style="font-weight: 800; letter-spacing: 2px;">WAITING FOR UPLINK...</p>
        <div style="background: rgba(255,255,255,0.03); border-radius: 24px; padding: 30px; margin: 20px 0;">
            <div style="opacity: 0.5; font-size: 0.8rem;">PLAYERS READY</div>
            <div id="lobby-count" class="gt-white" style="font-size: 3rem; font-weight: 900;">0</div>
        </div>
        <button id="enter-arena-btn" class="action-btn" onclick="requestStart()" disabled>CONNECTING...</button>
    </div>
</div>

<div id="overlay" style="display:none;">
    <div class="premium-card">
        <h1 id="res-title" class="gt-gold" style="font-size: 3rem;">GAME OVER</h1>
        <p id="res-msg" style="margin-bottom: 30px;">The Arena has concluded.</p>
        <button class="action-btn" onclick="location.reload()">RE-ENTER ARENA</button>
    </div>
</div>

<header>
    <div class="brand">The Chosen One</div>
    <div class="header-right">
        <div class="user-profile">
            <div class="user-avatar" id="role-badge">?</div>
            <div id="role-text" style="font-size: 0.8rem; font-weight: 800;">SYNCING...</div>
        </div>
    </div>
</header>

<main>
    <section id="ladder"></section>
    <section id="contestant-panel">
        <div style="text-align:center;">
            <div id="timer-text" style="font-size: 2rem; font-weight: 900;" class="gt-accent">15</div>
        </div>
        <div>
            <p id="q-text" class="gt-white" style="font-weight: 700; font-size: 1.2rem; min-height: 60px;"></p>
            <button class="btn-opt" onclick="userSelect(0)">A. ...</button>
            <button class="btn-opt" onclick="userSelect(1)">B. ...</button>
            <button class="btn-opt" onclick="userSelect(2)">C. ...</button>
        </div>
        <div class="heatmap" id="heatmap">
            <div class="heat-bar" id="bar-0"></div>
            <div class="heat-bar" id="bar-1"></div>
            <div class="heat-bar" id="bar-2"></div>
        </div>
        <div class="chosen-only" style="margin-top: 10px;">
            <button class="action-btn" style="background: var(--gold-gradient); color:#000;">WALK AWAY</button>
        </div>
    </section>
    <section id="mob-grid"></section>
</main>

<script>
    const socket = io();
    let myRole = 'mob';
    let selected = null;
    let currentQIndex = 0;

    const grid = document.getElementById('mob-grid');
    for(let i=0; i<100; i++) grid.innerHTML += `<div class="mob-tile" id="m-${i}">👤</div>`;
    
    const prizes = ["$1k", "$5k", "$10k", "$25k", "$50k", "$100k", "$250k", "$500k", "$1M"];
    prizes.forEach((p, i) => document.getElementById('ladder').innerHTML += `<div class="step" id="s-${i}">${p}</div>`);

    socket.on('init', (data) => {
        myRole = data.role;
        document.getElementById('role-badge').innerText = (myRole === 'chosen' ? 'C1' : 'M');
        document.getElementById('role-text').innerText = (myRole === 'chosen' ? 'CHOSEN ONE' : 'THE MOB');
        
        if(myRole === 'mob') {
            document.body.classList.add('is-mob');
            document.getElementById('enter-arena-btn').innerText = "WAITING FOR MASTER";
        } else {
            document.getElementById('enter-arena-btn').innerText = "START THE ARENA";
        }
    });

    socket.on('updateMob', (count) => {
        document.getElementById('lobby-count').innerText = count;
        if(count >= 1) document.getElementById('enter-arena-btn').disabled = false;
    });

    socket.on('gameStart', () => {
        document.getElementById('lobby-overlay').style.display = 'none';
    });

    socket.on('nextQuestion', (data) => {
        selected = null;
        document.getElementById('q-text').innerText = data.q;
        document.getElementById('heatmap').style.opacity = 0;
        document.querySelectorAll('.mob-tile').forEach(t => t.classList.remove('voted'));
        
        const opts = document.querySelectorAll('.btn-opt');
        opts.forEach((btn, i) => {
            btn.innerText = `${String.fromCharCode(65+i)}. ${data.o[i]}`;
            btn.classList.remove('locked', 'reveal-correct', 'reveal-wrong');
            btn.disabled = false;
        });
    });

    socket.on('tick', (count) => {
        document.getElementById('timer-text').innerText = count;
    });

    socket.on('mobVoted', () => {
        const available = document.querySelectorAll('.mob-tile:not(.voted):not(.eliminated)');
        if(available.length > 0) available[0].classList.add('voted');
    });

    socket.on('reveal', (data) => {
        const opts = document.querySelectorAll('.btn-opt');
        opts.forEach((btn, i) => {
            btn.disabled = true;
            if(i === data.correct) btn.classList.add('reveal-correct');
            else if(i === selected) btn.classList.add('reveal-wrong');
        });

        document.getElementById('heatmap').style.opacity = 1;
        [0,1,2].forEach(i => {
            const bar = document.getElementById(`bar-${i}`);
            bar.style.height = (data.stats[i] || 5) + "%";
            bar.className = 'heat-bar ' + (i === data.correct ? 'correct' : 'incorrect');
        });

        // Update Ladder
        document.querySelectorAll('.step').forEach(s => s.classList.remove('active'));
        document.getElementById(`s-${currentQIndex}`).classList.add('active');
        currentQIndex++;
    });

    socket.on('gameOver', (data) => {
        document.getElementById('overlay').style.display = 'flex';
        document.getElementById('res-msg').innerText = data.message;
    });

    function requestStart() { if(myRole === 'chosen') socket.emit('startGame'); }
    
    function userSelect(i) {
        if(selected !== null) return;
        selected = i;
        document.querySelectorAll('.btn-opt').forEach((b, idx) => b.classList.toggle('locked', idx === i));
        socket.emit('submitAnswer', i);
    }
</script>
</body>
</html>
