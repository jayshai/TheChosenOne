<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>THE CHOSEN ONE // ARENA</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        :root {
            --system-font: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            --bg-deep: #050507;
            --surface: rgba(255, 255, 255, 0.03);
            --surface-lift: rgba(255, 255, 255, 0.08);
            --accent: #6366f1;
            --accent-glow: rgba(99, 102, 241, 0.4);
            --success: #10b981;
            --danger: #ef4444;
            --gold: #f59e0b;
            --gold-glow: rgba(245, 158, 11, 0.4);
            --muted: #31313a;
            --premium-gradient: linear-gradient(180deg, #FFFFFF 30%, #6366f1 100%);
            --btn-gradient: linear-gradient(135deg, #6366f1 0%, #4338ca 100%);
            --gold-gradient: linear-gradient(135deg, #f59e0b 0%, #d97706 100%);
            --txt-white: linear-gradient(180deg, #FFFFFF 40%, #a5a5a5 100%);
            --txt-accent: linear-gradient(180deg, #a5b4fc 0%, #6366f1 100%);
            --txt-gold: linear-gradient(180deg, #fde68a 0%, #f59e0b 100%);
        }

        * { box-sizing: border-box; }
        body { margin: 0; font-family: var(--system-font); background-color: var(--bg-deep); color: #fff; height: 100vh; display: flex; flex-direction: column; overflow: hidden; position: relative; }
        
        #bg-canvas { position: fixed; top: -50%; left: -50%; width: 200%; height: 200%; z-index: -1; background: radial-gradient(circle at 30% 30%, rgba(99, 102, 241, 0.15) 0%, transparent 40%), radial-gradient(circle at 70% 70%, rgba(245, 158, 11, 0.08) 0%, transparent 40%); animation: auroraDrift 25s ease-in-out infinite alternate; }
        @keyframes auroraDrift { 0% { transform: translate(0, 0) rotate(0deg); } 100% { transform: translate(8%, 4%) rotate(3deg); } }
        
        .gt-white { background: var(--txt-white); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gt-accent { background: var(--txt-accent); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
        .gt-gold { background: var(--txt-gold); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }

        header { height: 75px; padding: 0 40px; display: flex; justify-content: space-between; align-items: center; background: rgba(10, 10, 12, 0.6); backdrop-filter: blur(20px); border-bottom: 1px solid rgba(255,255,255,0.05); z-index: 10; }
        .brand { font-weight: 900; font-size: 1.3rem; letter-spacing: -0.05em; background: var(--premium-gradient); -webkit-background-clip: text; -webkit-text-fill-color: transparent; text-transform: uppercase; }
        
        main { display: grid; grid-template-columns: 100px 420px 1fr; flex-grow: 1; padding: 25px; gap: 20px; height: calc(100vh - 75px); position: relative; z-index: 1; }

        #lobby-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.8); backdrop-filter: blur(40px); z-index: 2000; display: flex; align-items: center; justify-content: center; }
        .premium-card { background: rgba(255, 255, 255, 0.04); border: 1px solid rgba(255, 255, 255, 0.1); border-radius: 40px; padding: 50px; text-align: center; width: 480px; box-shadow: 0 40px 100px rgba(0,0,0,0.6); }
        
        .input-group { margin-bottom: 20px; text-align: left; }
        .input-label { font-size: 0.65rem; font-weight: 800; opacity: 0.5; margin-bottom: 8px; display: block; letter-spacing: 1px; }
        .premium-input { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.1); border-radius: 12px; padding: 14px; color: white; font-weight: 600; outline: none; transition: 0.3s; }
        .premium-input:focus { border-color: var(--accent); background: rgba(255,255,255,0.1); }
        
        .avatar-grid { display: flex; gap: 10px; margin-top: 10px; justify-content: center; }
        .avatar-opt { width: 44px; height: 44px; border-radius: 50%; display: flex; align-items: center; justify-content: center; background: var(--surface); border: 2px solid transparent; cursor: pointer; transition: 0.2s; font-size: 1.2rem; }
        .avatar-opt.active { border-color: var(--accent); background: var(--surface-lift); transform: scale(1.1); box-shadow: 0 0 15px var(--accent-glow); }

        .action-btn { width: 100%; padding: 18px; border-radius: 16px; border: none; font-weight: 900; cursor: pointer; text-transform: uppercase; transition: 0.3s; }
        .btn-play { background: var(--btn-gradient); color: #fff; box-shadow: 0 10px 25px var(--accent-glow); }
        .invite-link { margin-top: 15px; font-size: 0.7rem; color: var(--accent); cursor: pointer; font-weight: 700; text-decoration: underline; display: block; }

        #ladder { display: flex; flex-direction: column-reverse; gap: 6px; }
        .step { flex: 1; background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.7rem; font-weight: 800; color: #444; }
        .step.active { border-color: var(--gold); color: var(--gold); background: rgba(245, 158, 11, 0.1); border-width: 1px; }

        #contestant-panel { background: rgba(18, 18, 23, 0.6); border-radius: 32px; border: 1px solid rgba(255,255,255,0.1); padding: 30px; display: flex; flex-direction: column; justify-content: space-between; backdrop-filter: blur(25px); }
        .btn-opt { width: 100%; background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); padding: 16px; margin-bottom: 8px; border-radius: 16px; color: #fff; font-weight: 600; text-align: left; cursor: pointer; }
        .btn-opt.locked { border-color: #fff; background: var(--btn-gradient); }

        #mob-grid { display: grid; grid-template-columns: repeat(10, 1fr); gap: 8px; }
        .mob-tile { background: rgba(255,255,255,0.02); border: 1px solid rgba(255,255,255,0.05); border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 1.2rem; opacity: 0.2; transition: 0.3s; }
        .mob-tile.active { opacity: 1; border-color: var(--accent); color: #fff; }
        
        .heatmap { display: flex; gap: 10px; height: 50px; margin-top: 15px; align-items: flex-end; opacity: 0; transition: 0.5s; }
        .heat-bar { flex: 1; border-radius: 4px; background: var(--muted); transition: height 0.5s; }
        .heat-bar.correct { background: var(--success); }
    </style>
</head>
<body>

<div id="bg-canvas"></div>

<div id="lobby-overlay">
    <div class="premium-card">
        <h1 class="premium-title">The Arena</h1>
        
        <div id="setup-ui">
            <div class="input-group">
                <span class="input-label">YOUR ALIAS</span>
                <input type="text" id="name-input" class="premium-input" placeholder="Enter name...">
                <div class="avatar-grid">
                    <div class="avatar-opt active" onclick="setAvatar(this, '👤')">👤</div>
                    <div class="avatar-opt" onclick="setAvatar(this, '💀')">💀</div>
                    <div class="avatar-opt" onclick="setAvatar(this, '🔥')">🔥</div>
                    <div class="avatar-opt" onclick="setAvatar(this, '💎')">💎</div>
                    <div class="avatar-opt" onclick="setAvatar(this, '⚡')">⚡</div>
                </div>
            </div>
            <div class="input-group">
                <span class="input-label">ROOM ACCESS</span>
                <div style="display: flex; gap: 10px;">
                    <input type="text" id="room-input" class="premium-input" placeholder="CODE" style="text-transform: uppercase;">
                    <button class="action-btn btn-play" style="width: 100px;" onclick="joinArena()">JOIN</button>
                </div>
                <span class="invite-link" onclick="copyInvite()">COPY INVITE LINK</span>
            </div>
        </div>

        <div id="waiting-ui" style="display: none;">
            <div style="background: rgba(255,255,255,0.03); border-radius: 20px; padding: 30px; margin-bottom: 20px;">
                <div id="lobby-count" class="gt-accent" style="font-size: 3rem; font-weight: 900;">0</div>
                <div style="font-size: 0.7rem; font-weight: 800; opacity: 0.5;">PLAYERS CONNECTED</div>
            </div>
            <button id="start-btn" class="action-btn btn-play" onclick="socket.emit('startArena')" disabled style="opacity: 0.5;">WAITING FOR MASTER</button>
        </div>
    </div>
</div>

<header>
    <div class="brand">The Chosen One</div>
    <div style="display: flex; gap: 20px;">
        <div id="score-box" style="text-align: right;">
            <span style="font-size: 0.6rem; opacity: 0.5; font-weight: 800; display: block;">SCORE</span>
            <div id="score-val" class="gt-gold" style="font-weight: 900;">$0</div>
        </div>
        <div style="display: flex; align-items: center; gap: 10px; background: var(--surface); padding: 5px 15px; border-radius: 100px; border: 1px solid rgba(255,255,255,0.1);">
            <div id="u-avatar" style="width: 24px; height: 24px; background: var(--accent); border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 0.7rem;">👤</div>
            <div id="u-name" style="font-size: 0.75rem; font-weight: 800;">...</div>
        </div>
    </div>
</header>

<main>
    <div id="ladder"></div>
    <section id="contestant-panel">
        <div style="text-align: center;"><div id="timer" style="font-size: 2rem; font-weight: 900;" class="gt-accent">15</div></div>
        <div>
            <p id="q-text" class="gt-white" style="font-weight: 700; font-size: 1.1rem; min-height: 60px;">Joining Arena...</p>
            <button class="btn-opt" onclick="sendAnswer(0)">A. ...</button>
            <button class="btn-opt" onclick="sendAnswer(1)">B. ...</button>
            <button class="btn-opt" onclick="sendAnswer(2)">C. ...</button>
        </div>
        <div class="heatmap" id="heatmap">
            <div class="heat-bar" id="hb-0"></div>
            <div class="heat-bar" id="hb-1"></div>
            <div class="heat-bar" id="hb-2"></div>
        </div>
    </section>
    <div id="mob-grid"></div>
</main>

<script>
    const socket = io();
    let myRole = 'spectator', currentAvatar = '👤';

    // Build UI
    const grid = document.getElementById('mob-grid');
    for(let i=0; i<100; i++) grid.innerHTML += `<div class="mob-tile" id="m-${i}">👤</div>`;
    const prizes = ["$1k", "$5k", "$10k", "$25k", "$50k", "$100k", "$250k", "$500k", "$1M"];
    const ladder = document.getElementById('ladder');
    prizes.forEach((p, i) => ladder.innerHTML += `<div class="step" id="s-${i}">${p}</div>`);

    const urlParams = new URLSearchParams(window.location.search);
    if(urlParams.get('room')) document.getElementById('room-input').value = urlParams.get('room');

    function setAvatar(el, icon) {
        document.querySelectorAll('.avatar-opt').forEach(a => a.classList.remove('active'));
        el.classList.add('active');
        currentAvatar = icon;
    }

    function copyInvite() {
        const code = document.getElementById('room-input').value || Math.random().toString(36).substring(2, 7).toUpperCase();
        document.getElementById('room-input').value = code;
        const link = `${window.location.origin}?room=${code}`;
        navigator.clipboard.writeText(link).then(() => alert("Link Copied!"));
    }

    function joinArena() {
        const name = document.getElementById('name-input').value || "ANON";
        const room = document.getElementById('room-input').value.toUpperCase();
        if(!room) return alert("Enter Room Code");
        socket.emit('joinRoom', { room, name, avatar: currentAvatar });
        document.getElementById('setup-ui').style.display = 'none';
        document.getElementById('waiting-ui').style.display = 'block';
    }

    socket.on('init', (data) => {
        myRole = data.role;
        document.getElementById('u-name').innerText = data.name + (myRole === 'spectator' ? ' (OBS)' : '');
        document.getElementById('u-avatar').innerText = currentAvatar;
        if(myRole === 'chosen') {
            const sb = document.getElementById('start-btn');
            sb.innerText = "START ARENA";
            sb.disabled = false;
            sb.style.opacity = "1";
        }
    });

    socket.on('updateMob', (count) => {
        document.getElementById('lobby-count').innerText = count;
        document.querySelectorAll('.mob-tile').forEach((t, i) => t.classList.toggle('active', i < count));
    });

    socket.on('arenaStarted', () => document.getElementById('lobby-overlay').style.display = 'none');

    socket.on('nextQ', (data) => {
        document.getElementById('heatmap').style.opacity = 0;
        document.getElementById('q-text').innerText = data.question;
        const btns = document.querySelectorAll('.btn-opt');
        btns.forEach((b, i) => {
            b.innerText = data.options[i];
            b.classList.remove('locked');
            b.disabled = (myRole === 'spectator');
        });
    });

    function sendAnswer(idx) {
        document.querySelectorAll('.btn-opt').forEach((b, i) => b.classList.toggle('locked', i === idx));
        socket.emit('submitAnswer', idx);
    }

    socket.on('reveal', (data) => {
        document.getElementById('heatmap').style.opacity = 1;
        [0,1,2].forEach(i => {
            const bar = document.getElementById(`hb-${i}`);
            bar.style.height = data.stats[i] + "%";
            bar.classList.toggle('correct', i === data.correct);
        });
    });
</script>
</body>
</html>
